<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KowaOne Timer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0b0f;
  color:white;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  text-align:center;
}

#display{
  font-size:120px;
  font-weight:700;
  margin-bottom:40px;
}

.buttons{
  display:flex;
  gap:12px;
  justify-content:center;
}

button{
  background:transparent;
  color:white;
  border:1px solid rgba(255,255,255,.15);
  padding:14px 22px;
  border-radius:14px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div id="display">25:00</div>

  <div class="buttons">
    <button onclick="startTimer(25)">25分</button>
    <button onclick="startTimer(30)">30分</button>
    <button onclick="stopTimer()">停止</button>
  </div>
</div>

<script type="module">
import { DiscordSDK } from "https://esm.sh/@discord/embedded-app-sdk";

const discordSdk = new DiscordSDK("1517716071958712381");

try {
  await discordSdk.ready();
  console.log("Discord接続成功");
} catch (e) {
  console.error("Discord接続失敗", e);
}

let timer;
let remaining = 1500;

function updateDisplay() {
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById("display").innerText =
    `${m}:${String(s).padStart(2,"0")}`;
}

window.startTimer = function(minutes){
  clearInterval(timer);

  remaining = minutes * 60;
  updateDisplay();

  timer = setInterval(() => {
    remaining--;
    updateDisplay();

    if (remaining <= 0) {
      clearInterval(timer);
      document.getElementById("display").innerText = "DONE";
    }
  }, 1000);
}

window.stopTimer = function(){
  clearInterval(timer);
}

updateDisplay();
</script>

</body>
</html>
